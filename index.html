<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>未掲載資格まとめクイズ｜180問・ランダム50問</title>
  <meta name="description" content="衛生管理者、診療情報管理士、医療情報技師、土木施工管理技士、建築設備士、銀行業務検定など、未掲載資格をまとめた資格試験対策クイズサイト。180問から50問をランダム出題。" />
  <link rel="stylesheet" href="style.css" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8398161859137802" crossorigin="anonymous"></script>
</head>
<body>
  <aside class="ad ad-left">
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-8398161859137802" data-ad-slot="5599163841" data-ad-format="auto" data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </aside>

  <main class="container">
    <header class="hero">
      <p class="badge">資格総合クイズ</p>
      <h1>未掲載資格まとめクイズ</h1>
      <p>180問からランダム50問を出題。回答すると自動で次の問題へ進みます。</p>
    </header>

    <section class="panel">
      <h2>ジャンルを選択</h2>
      <div id="categoryButtons" class="category-grid"></div>
    </section>

    <section id="quizArea" class="quiz-card hidden">
      <div class="quiz-top">
        <span id="progress">1 / 50</span>
        <span id="score">正解 0</span>
      </div>
      <h2 id="examTitle"></h2>
      <p id="questionText" class="question"></p>
      <div id="choices" class="choices"></div>
      <div id="explanation" class="explanation hidden"></div>
    </section>

    <section id="resultArea" class="result-card hidden">
      <h2>結果</h2>
      <p id="resultText"></p>
      <button id="restartBtn">もう一度挑戦する</button>
    </section>
  </main>

  <aside class="ad ad-right">
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-8398161859137802" data-ad-slot="5599163841" data-ad-format="auto" data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </aside>

  <script src="script.js"></script>
</body>
</html>
